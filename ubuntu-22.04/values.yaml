githubConfigUrl: "https://github.com/pyvista"

githubConfigSecret:
  github_token: "pre-defined-secret"

apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: ghrunner-22-04
  namespace: actions-runner-system
  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
spec:
  replicas: 1
  template:
    spec:
      group: "pyvista-self-hosted"
      organization: pyvista
      containers:
        - name: runner
          image: ghcr.io/pyvista/arc-runners:ubuntu22.04-d878ec26d5b1e60b6c37a81381b3aeab46833e24
          imagePullPolicy: Always
          env:
            - name: GITHUB_ACTIONS_RUNNER_TLS_NO_VERIFY
              value: "0"
            - name: GIT_SSL_NO_VERIFY
              value: "false"
          resources:
            requests:
              cpu: "2"
              memory: "16Gi"
            limits:
              cpu: "2"
              memory: "16Gi"
