- name: Ensure Helm is installed
  hosts: server[0]
  become: yes
  tasks:
    - name: Check if helm is already installed
      command: helm version --short
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Add Helm apt key
      apt_key:
        url: https://baltocdn.com/helm/signing.asc
        state: present
      when: helm_check.rc != 0

    - name: Add Helm apt repository
      apt_repository:
        repo: "deb https://baltocdn.com/helm/stable/debian/ all main"
        state: present
        filename: helm-stable-debian
      when: helm_check.rc != 0

    - name: Update apt cache
      apt:
        update_cache: yes
      when: helm_check.rc != 0

    - name: Install Helm
      apt:
        name: helm
        state: present
      when: helm_check.rc != 0

- name: Deploy NVIDIA GPU Operator
  hosts: server[0]
  become: yes
  tasks:
    - name: Check if NVIDIA GPU Operator release exists
      command: helm status nvidiagpu -n gpu-operator
      register: gpuop_status
      failed_when: false
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Add NVIDIA Helm repo
      command: helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
      args:
        creates: /root/.cache/helm/repository/nvidia-index.yaml
      when: gpuop_status.rc != 0

    - name: Update Helm repos
      command: helm repo update
      when: gpuop_status.rc != 0

    - name: Install NVIDIA GPU Operator
      command: >
        helm install --wait nvidiagpu
        -n gpu-operator --create-namespace
        --set toolkit.env[0].name=CONTAINERD_CONFIG
        --set toolkit.env[0].value=/var/lib/rancher/k3s/agent/etc/containerd/config.toml
        --set toolkit.env[1].name=CONTAINERD_SOCKET
        --set toolkit.env[1].value=/run/k3s/containerd/containerd.sock
        --set toolkit.env[2].name=CONTAINERD_RUNTIME_CLASS
        --set toolkit.env[2].value=nvidia
        --set toolkit.env[3].name=CONTAINERD_SET_AS_DEFAULT
        --set-string toolkit.env[3].value=true
        nvidia/gpu-operator
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      when: gpuop_status.rc != 0
